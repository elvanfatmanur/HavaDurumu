<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hava Durumu - Premium Weather App</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search,location_on,water_drop,air" />
</head>
<body>
    
    <main class="main-container">

         <header class="input-container">
            <div class="search-wrapper">
                <input class="city-input" placeholder="Şehir Ara..." type="text">
                <button class="search-btn">
                    <span class="material-symbols-outlined">search</span>
                </button>
            </div>
            <button id="favoriteStarBtn" class="search-star" style="display: none;">★</button>
         </header>
         
         <div class="favorites-accordion" id="favAccordion" style="display: none;">
            <button class="favorites-toggle" id="favToggle">
                <span class="fav-icon">⭐</span>
                Favori Şehirlerim
                <span class="expand-icon" id="favExpandIcon">▼</span>
            </button>
            <div id="favoritesList" class="favorites-list"></div>
         </div>

         <div class="controls-container">
            <button id="openModal" class="premium-btn qr-btn">
                <span>📷 QR Kod</span>
            </button>
         </div>

        <div class="modal" id="modal">
            <div class="modal-inner">
                <h2>Uygulama QR Kodu</h2>
                <div id="qrcode" style="text-align: center; margin: 20px 0;"></div>
                <button id="closeModal" class="premium-btn">Kapat</button>
            </div>
        </div>
         
        <section class="weather-info" style="display: none;"> 
            <div class="location-date-container">     
                <div class="location">
                   <img src="ekipmanlar/location.svg" alt="Location">
                   <h4 class="country-txt">İstanbul</h4>
                </div>
                <h5 class="current-date-txt regular-txt">Yükleniyor...</h5>
            </div>

            <div class="weather-summary-container"> 
                <img src="ekipmanlar/clear.svg" class="weather-summary-img" alt="Weather Summary">
                <div class="weather-summary-info">
                   <h1 class="temp-txt">0°C</h1>
                   <h3 class="condition-txt regular-txt">Hava Durumu</h3>
                </div>
            </div>
            
            <div class="weather-conditions-container">  
                <div class="conditions-item">
                    <img src="ekipmanlar/water drop.svg" alt="Humidity">
                    <div class="conditions-info">
                        <h5 class="regular-txt">Nem</h5>
                        <h5 class="nem-value-txt">0%</h5>
                    </div>
                </div>

                <div class="conditions-item">
                    <img src="ekipmanlar/air.svg" alt="Wind">
                    <div class="conditions-info">
                        <h5 class="regular-txt">Rüzgar</h5>
                        <h5 class="rüzgar-value-txt">0 km/s</h5>
                    </div>
                </div>
            </div>

            <div class="forecast-section">
                <h4 class="forecast-title">5 Günlük Tahmin</h4>
                <div class="forecast-items-container">    
                    <!-- Forecast items will be injected here -->
                </div>
            </div>
        </section>

        <section class="sehir-arayin section-message">  
            <img src="ekipmanlar/girissekran.svg" alt="Search">
            <div class="message-content">
                <h1>Hava Durumunu Öğrenin</h1>
                <p class="regular-txt">Hemen bir şehir arayarak başlayın.</p>
            </div>
        </section> 
        
        <section class="Sehir-bulunamadi section-message" style="display: none;">
            <img src="ekipmanlar/uyarı.svg" alt="Not Found">
            <div class="message-content">
                <h1>Şehir Bulunamadı</h1>
                <p class="regular-txt">Lütfen geçerli bir şehir ismi girin.</p>
            </div>
        </section>

    </main>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>
